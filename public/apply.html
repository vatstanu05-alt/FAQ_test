<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply Now</title>

<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

body{
  background: #F4F6F9;
  padding: 20px 20px; /* Combined padding to optimize mobile viewports */
}

/* Page wrapper to perfectly align the back button with the card */
.page-wrapper {
  max-width: 700px;
  margin: 0 auto 16px auto;
}

/* Secondary Navigation Button Styling */
.back-btn {
  background: transparent;
  color: #475569;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-size: 14px;
  padding: 8px 0;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s ease;
}

.back-btn:hover {
  color: #1E293B;
}

/* Main Form Card Container */
.container{
  max-width: 700px;
  margin: auto;
  background: #FFFFFF;
  padding: 20px; /* Increased internal padding for breathing room */
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  color: #1E293B;
}

h1{
  margin-bottom: 8px;
  font-size: 28px;
  color: #0F172A;
}

.subtitle{
  color: #475569;
  margin-bottom: 30px;
  font-size: 15px;
}

.form-group{
  margin-bottom: 20px;
}

label{
  display: block;
  margin-bottom: 8px;
  font-weight: 600; /* Made slightly thicker for clean typography hierarchy */
  font-size: 14px;
  color: #334155;
}

/* Input Fields - Added crisp focus states */
input, select, textarea{
  width: 100%;
  padding: 12px 14px;
  border: 1px solid #CBD5E1; /* Visible gray borders */
  border-radius: 8px;
  background: #FFFFFF;
  font-size: 15px;
  color: #0F172A;
  outline: none;
  transition: all 0.2s ease;
}

input:focus, select:focus, textarea:focus {
  border-color: #2563EB; /* Clean brand blue focus color */
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); /* Soft accessible outline ring */
}

textarea{
  resize: vertical;
}

/* Primary Action Button styling */
.submit-btn {
  width: 100%;
  padding: 14px;
  background: #1A2B3B;
  color: #FFFFFF !important; /* Forces bold white contrast */
  font-weight: 600;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  margin-top: 10px;
  transition: background-color 0.2s ease;
}

.submit-btn:hover{
  background: #0F172A;
}

.success{
  display: none;
  margin-top: 20px;
  padding: 15px;
  background: #DCFCE7;
  color: #166534;
  border-radius: 8px;
  border: 1px solid #BBF7D0;
  font-size: 14px;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="page-wrapper">
   <!-- Added unique class name to prevent styling interference -->
   <button class="back-btn" onclick="history.back()">← Back to FAQ</button> 
</div>

<div class="container">

<h1>Summer Internship Application</h1>
<p class="subtitle">Fill out the form below to apply.</p>

<form id="applicationForm">

<div class="form-group">
<label>Full Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" required>
</div>

<div class="form-group">
<label>College / University</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Degree</label>
<input type="text" placeholder="B.Tech, B.Sc, M.Tech..." required>
</div>

<div class="form-group">
<label>Current Year</label>
<select required>
<option value="">Select Year</option>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
<option>Graduate</option>
</select>
</div>

<div class="form-group">
<label>Domain of Interest</label>
<select required>
<option value="">Select Domain</option>
<option>Web Development</option>
<option>Machine Learning</option>
<option>Cybersecurity</option>
<option>Data Science</option>
<option>Research</option>
</select>
</div>

<div class="form-group">
<label>Why do you want to join?</label>
<textarea rows="4" required></textarea>
</div>

<!-- Replaced inline width parameter with global class modifier -->
<button type="submit" class="submit-btn">Submit Application</button>

</form>

<div class="success" id="successBox">
✅ <strong>Application submitted successfully.</strong><br>
Our team will contact you via email shortly.
</div>

</div>

<script>
document.getElementById("applicationForm")
.addEventListener("submit", function(e){
  e.preventDefault();
  document.getElementById("successBox").style.display = "block";
  this.reset();
});
</script>

</body>
</html>
